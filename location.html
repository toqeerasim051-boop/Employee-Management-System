<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee Locations</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #f0f4f8, #dbeafe);
  color: #f8fafc;
}

nav {
  background: #1e293b;
  padding: 1rem 2rem;
  display: flex;
  justify-content: center;
  gap: 2rem;
}

nav a {
  color: #e2e8f0;
  text-decoration: none;
  font-weight: 600;
}

nav a:hover {
  color: #60a5fa;
}

h2 {
  text-align: center;
  margin: 25px 0;
  font-size: 2.2rem;
  color: #1f2937;
}

#map {
  height: 80vh;
  width: 92%;
  margin: 0 auto 40px auto;
  border-radius: 16px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.3);
}
</style>
</head>

<body>

<nav>
  <a href="index.html">Home</a>
  <a href="add.html">Add Employee</a>
  <a href="view.html">View Employees</a>
  <a href="location.html">Locations</a>
</nav>

<h2>Employee Locations</h2>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
let map;
let markers = [];
let positionCount = {};

// ---- INIT MAP ----
function initMap() {
  map = L.map('map').setView([30.3753, 69.3451], 6);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  loadEmployees();
}

// ---- OFFSET (same logic you had) ----
function offsetLatLng(lat, lng, index) {
  if (index === 0) return [lat, lng];

  const step = 0.0003;
  const angle = (index - 1) * 45 * (Math.PI / 180);

  return [
    lat + step * Math.cos(angle),
    lng + step * Math.sin(angle)
  ];
}

// ---- CLEAR MARKERS ----
function clearMarkers() {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
}

// ---- BUILD POPUP ----
function buildInfo(emp) {
  const name = `${emp.firstName || ''} ${emp.lastName || ''}`.trim();

  return `
    <div style="font-family:Segoe UI; min-width:200px;">
      <b>${name || "Employee"}</b><br>
      📧 ${emp.email || "N/A"}<br>
      📞 ${emp.phone || "N/A"}<br>
      📍 ${emp.city || ""} ${emp.country || ""}
    </div>
  `;
}

// ---- LOAD EMPLOYEES ----
async function loadEmployees() {
  clearMarkers();

  let localEmployees = JSON.parse(localStorage.getItem("newEmployees") || "[]");

  localEmployees.forEach(emp => {
    let lat = parseFloat(emp.latitude);
    let lng = parseFloat(emp.longitude);

    if (isNaN(lat) || isNaN(lng)) return;

    let key = `${lat},${lng}`;
    positionCount[key] = (positionCount[key] || 0) + 1;

    let pos = offsetLatLng(lat, lng, positionCount[key] - 1);

    let marker = L.marker(pos).addTo(map);
    marker.bindPopup(buildInfo(emp));

    markers.push(marker);
  });
}

// ---- START ----
initMap();

// realtime update
setInterval(loadEmployees, 3000);

</script>

</body>
</html>
