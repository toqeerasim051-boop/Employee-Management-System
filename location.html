<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Employee Locations</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"> <!-- Icons -->
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #f0f4f8, #dbeafe);
      color: #f8fafc;
    }

    /* ---- Navbar ---- */
    nav {
      background: #1e293b;
      padding: 1rem 2rem;
      display: flex;
      justify-content: center;
      gap: 2rem;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
    }

    nav a {
      color: #e2e8f0;
      text-decoration: none;
      font-weight: 600;
      padding: 0.8rem 1.6rem;
      border-radius: 12px;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      transition: all 0.3s ease-in-out;
      font-size: 1.05rem;
    }

    nav a i {
      font-size: 1.2rem;
      transition: transform 0.3s ease-in-out;
    }

    nav a:hover {
      background: #2563eb;
      color: #fff;
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(37, 99, 235, 0.5);
    }

    nav a:hover i {
      transform: scale(1.2) rotate(10deg);
    }

    /* ---- Title ---- */
    h2 {
      text-align: center;
      margin: 25px 0;
      font-size: 2.2rem;
      font-weight: bold;
      color:  #1f2937;
      text-shadow: 0 3px 10px rgba(0, 0, 0, 0.6);
    }

    /* ---- Map ---- */
    #map {
      height: 80vh;
      width: 92%;
      margin: 0 auto 40px auto;
      border-radius: 16px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
      
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html"><i class="fas fa-home"></i> Home</a>
  <a href="add.html"><i class="fas fa-user-plus"></i> Add Employee</a>
  <a href="view.html"><i class="fas fa-list me-1"></i> View Employees</a>
  <a href="location.html"><i class="fas fa-map-marker-alt"></i> Employee Locations</a>
</nav>

<h2>Employee Locations</h2>
<div id="map"></div>

<script>
let map;
let markers = [];
let bounds;
let singleInfoWindow = null;
let positionCount = {}; // ✅ global counter for overlapping positions

// ---- Utils ----
function parseJSONSafe(txt) {
  try { return JSON.parse(txt); } catch { return null; }
}

// ✅ Better offset logic: markers spread in circle if same lat/lng
function offsetLatLng(lat, lng, index) {
  if (index === 0) return { lat, lng }; // first marker stays exact
  const step = 0.0003; // distance from center
  const angle = (index - 1) * 45 * (Math.PI / 180); // rotate every 45°
  return {
    lat: lat + step * Math.cos(angle),
    lng: lng + step * Math.sin(angle)
  };
}

function clearMarkers() {
  markers.forEach(m => m.setMap(null));
  markers = [];
  if (singleInfoWindow) singleInfoWindow.close();
}

// ---- Activation Code ----
async function getActivationCode() {
  try {
    const res = await fetch("https://api.findofficers.com/hiring_test/get_activation_code", { method: "POST" });
    const text = await res.text();
    const json = parseJSONSafe(text);

    let code = null;
    if (json) {
      code = json.activationCode || json.code || json.activation_code || null;
    } else {
      code = text.replace(/["\s]/g, "").trim();
    }

    if (!code) throw new Error("Activation code missing");

    sessionStorage.setItem("lastActivationCode", code);
    console.log("[MAP] activationCode =", code);
    return code;
  } catch (err) {
    console.error("[MAP] Activation code error:", err);
    return null;
  }
}

// ---- Fetch All Employees ----
async function fetchAllEmployees(code) {
  try {
    const res = await fetch("https://api.findofficers.com/hiring_test/get_all_employee", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ activationCode: code })
    });

    const text = await res.text();
    const data = parseJSONSafe(text);

    let apiEmployees = [];
    if (Array.isArray(data)) apiEmployees = data;
    else if (data && Array.isArray(data.employees)) apiEmployees = data.employees;
    else if (data && Array.isArray(data.data)) apiEmployees = data.data;
    else if (data && data.results && Array.isArray(data.results)) apiEmployees = data.results;
    else if (!data && text.trim().startsWith("[")) apiEmployees = JSON.parse(text);

    console.log("[MAP] apiEmployees count =", apiEmployees.length);
    return apiEmployees;
  } catch (err) {
    console.error("[MAP] Fetch employees error:", err);
    return [];
  }
}

// ---- Build Info HTML ----
function buildInfoHtml(emp) {
  const first = emp.firstName || emp.first_name || emp.fname || "";
  const last = emp.lastName || emp.last_name || emp.lname || "";
  const name = (first || last) ? `${first} ${last}`.trim() : "N/A";

  const phone = emp.phoneNumber || emp.phone || emp.mobile || "";
  const city = emp.city || "";
  const country = emp.country || "";
  const email = emp.email || "";

  return `
    <div style="min-width:220px; font-family: Segoe UI, Arial, sans-serif; color:#0b1220; line-height:1.35;">
      <div style="font-weight:700; font-size:14px; margin-bottom:6px;">${escapeHtml(name)}</div>
      ${email ? `<div style="font-size:13px; margin-bottom:6px;">📧 ${escapeHtml(email)}</div>` : ""}
      ${phone ? `<div style="font-size:13px; margin-bottom:6px;">📞 ${escapeHtml(phone)}</div>` : ""}
      ${(city || country) ? `<div style="font-size:13px; color:#344054;">📍 ${escapeHtml(city)}${city && country ? ", " : ""}${escapeHtml(country)}</div>` : `<div style="font-size:13px; color:#6b7280;">Location: N/A</div>`}
    </div>
  `;
}

function escapeHtml(str) {
  if (!str && str !== 0) return "";
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

// ---- Load Employees ----
async function loadEmployees() {
  clearMarkers();
  bounds = new google.maps.LatLngBounds();

  let code = sessionStorage.getItem("lastActivationCode");
  if (!code) code = await getActivationCode();

  let apiEmployees = [];
  if (code) {
    apiEmployees = await fetchAllEmployees(code);
    if (apiEmployees.length === 0) {
      console.warn("[MAP] API employees empty, refreshing activation code...");
      code = await getActivationCode();
      if (code) apiEmployees = await fetchAllEmployees(code);
    }
  }

  const localEmployees = JSON.parse(localStorage.getItem("newEmployees") || "[]");
  const allEmployees = [...apiEmployees, ...localEmployees];
  console.log("[MAP] total employees to plot =", allEmployees.length, { api: apiEmployees.length, local: localEmployees.length });

  if (allEmployees.length === 0) return;

  singleInfoWindow = singleInfoWindow || new google.maps.InfoWindow();

  allEmployees.forEach(emp => {
    const lat = parseFloat(emp.latitude);
    const lng = parseFloat(emp.longitude);
    if (isNaN(lat) || isNaN(lng)) return;

    const key = `${lat},${lng}`;
    positionCount[key] = (positionCount[key] || 0) + 1;

    // ✅ spread same-location markers (persists globally)
    const pos = offsetLatLng(lat, lng, positionCount[key] - 1);

    const marker = new google.maps.Marker({
      position: pos,
      map,
      title: `${(emp.firstName || emp.first_name || emp.fname || "")} ${(emp.lastName || emp.last_name || emp.lname || "")}`.trim() || "Employee",
      animation: google.maps.Animation.DROP
    });

    marker.addListener("click", () => {
      const html = buildInfoHtml(emp);
      singleInfoWindow.setContent(html);
      singleInfoWindow.open(map, marker);
    });

    markers.push(marker);
    bounds.extend(marker.getPosition());
  });

  if (markers.length > 0) {
    map.setCenter({ lat: 30.3753, lng: 69.3451 });
    map.setZoom(6);
  }
}

// ---- Init Map ----
function initMap() {
  map = new google.maps.Map(document.getElementById("map"), {
    center: { lat: 30.3753, lng: 69.3451 },
    zoom: 6,
    mapTypeControl: false,
    streetViewControl: false,
    fullscreenControl: false,
    zoomControl: true,
    gestureHandling: "greedy",
    mapTypeId: "roadmap"
  });

  loadEmployees();
}

window.addEventListener("storage", (e) => {
  if (e.key === "newEmployees") {
    console.log("[MAP] storage event -> reload markers");
    loadEmployees();
  }
});
// Poll localStorage every 2 seconds for new employees
let lastCount = JSON.parse(localStorage.getItem("newEmployees") || "[]").length;

setInterval(() => {
  const current = JSON.parse(localStorage.getItem("newEmployees") || "[]");
  if (current.length !== lastCount) {
    lastCount = current.length;
    console.log("[MAP] detected new employee -> reload markers");
    loadEmployees();
  }
}, 2000);

</script>

<!-- clustering library (optional, you can keep or remove) -->
<script src="https://unpkg.com/@googlemaps/markerclusterer/dist/index.min.js"></script>



<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAUeSZglwfl9L2D5TsfI0mfjLAht9mkEjg&callback=initMap" async defer></script>

</body>
</html>
